<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>旅行小助手</title>
    <style>
        /* 🎨 高級莫蘭迪 x 奶茶手帳風 多彩調色盤 */
        :root { 
            --bg-cream: #FCF8F2;      /* 溫潤的香草背景 */
            --main-text: #7A5F4F;     /* 焦糖栗子色 (主文字) */
            --main-border: #B59B88;   /* 柔和拿鐵色 (邊框) */
            --main-btn: #A8866E;      /* 主按鈕底色 */
            --card-bg: #FFFFFF;       /* 卡片純白 */
            
            /* ✨ 豐富的多彩莫蘭迪色 */
            --color-yellow: #E2B965;     /* 奶油芥末黃 (首頁、強調) */
            --color-terracotta: #CD8B76; /* 復古紅陶 (行李、重要刪除) */
            --color-matcha: #9CB292;     /* 日式抹茶綠 (行程、完成) */
            --color-babyblue: #8FAEC1;   /* 質感寶寶藍 (購物、價格標籤) */
            --color-lilac: #B49BAA;      /* 丁香芋紫 (設定、次要標籤) */
            
            --text-muted: #B0A29A;    /* 柔和的次要灰字 */
            --input-bg: #F9F5F0;      /* 輸入框微暖底色 */
        }
        
        html { background-color: var(--bg-cream); }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif; }
        
        body { 
            background-color: var(--bg-cream); color: var(--main-text); 
            padding-bottom: 120px; line-height: 1.5; -webkit-tap-highlight-color: transparent; min-height: 100vh;
            /* 隱約的點狀背景增加手帳紙張感 */
            background-image: radial-gradient(rgba(140, 106, 83, 0.08) 1px, transparent 1px); background-size: 18px 18px;
        }
        
        .page { display: none; padding: 18px; animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        
        /* 👑 頂部標題 */
        header { 
            background: var(--card-bg); color: var(--main-text); 
            padding: calc(16px + env(safe-area-inset-top)) 20px 15px; 
            font-size: 1.35rem; font-weight: 900; letter-spacing: 2px;
            position: sticky; top: 0; z-index: 50; text-align: center;
            border-bottom: 2px solid var(--main-border);
            border-radius: 0 0 24px 24px;
            box-shadow: 0 4px 15px rgba(122, 95, 79, 0.06);
        }
        
        /* 📜 質感卡片 */
        .card { 
            background: var(--card-bg); border-radius: 20px; padding: 20px; margin-bottom: 18px; 
            border: 2px solid var(--main-border);
            box-shadow: 2px 4px 0px rgba(181, 155, 136, 0.2); 
            position: relative;
            background-image: linear-gradient(135deg, #FFFFFF 0%, #FCFBF9 100%);
        }
        
        /* 🎀 裝飾：行李卡片上方的小紙膠帶 */
        #luggage-list .card::before {
            content: ""; position: absolute; top: -6px; left: 50%; transform: translateX(-50%) rotate(-2deg);
            width: 45px; height: 14px; background-color: var(--color-terracotta);
            opacity: 0.35; border-radius: 2px; box-shadow: 1px 1px 0 rgba(0,0,0,0.05); z-index: 10;
        }

        /* 🎀 裝飾：購物卡片左側的小紙膠帶 */
        #shopping-list .card::before {
            content: ""; position: absolute; top: 15px; left: -8px; transform: rotate(-5deg);
            width: 16px; height: 35px; background-color: var(--color-babyblue);
            opacity: 0.45; border-radius: 2px; box-shadow: 1px 1px 0 rgba(0,0,0,0.05); z-index: 10;
        }

        /* 📊 彩色進度條區塊 */
        .stat-wrapper {
            display: flex; align-items: center; justify-content: space-between; 
            padding: 12px 16px; border-radius: 14px; margin-bottom: 12px;
            border: 1px solid rgba(0,0,0,0.03);
        }
        .stat-label { font-weight: 800; display: flex; align-items: center; gap: 10px; font-size: 1rem; }
        .stat-value { font-weight: 900; font-size: 1.15rem; }

        /* 📱 底部彩色圓圈導覽列 */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px); display: flex; justify-content: space-around; 
            padding: 10px 0 calc(10px + env(safe-area-inset-bottom)); 
            border-top: 2px solid var(--main-border); z-index: 100;
            box-shadow: 0 -4px 15px rgba(181, 155, 136, 0.1);
        }
        .nav-item { 
            text-align: center; font-size: 0.72rem; color: var(--text-muted); cursor: pointer; 
            flex: 1; font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 4px;
        }
        .nav-icon-bg { 
            width: 44px; height: 44px; border-radius: 22px; display: flex; justify-content: center; align-items: center; 
            transition: 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); color: var(--text-muted);
        }
        .nav-svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
        
        .nav-item.active { color: var(--main-text); }
        .nav-item.active .nav-icon-bg { color: #fff; transform: translateY(-4px); box-shadow: 0 4px 8px rgba(0,0,0,0.15); }
        
        /* 🔘 按鈕樣式 */
        button { 
            background: var(--main-btn); 
            background-image: linear-gradient(180deg, var(--main-btn) 0%, #95755E 100%);
            color: white; border: 2px solid var(--main-btn); padding: 14px 20px; 
            border-radius: 14px; font-weight: 800; font-size: 1.05rem; cursor: pointer; 
            transition: 0.15s; box-shadow: 2px 4px 0 rgba(181, 155, 136, 0.3); 
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        button:active { transform: translate(2px, 2px); box-shadow: 0 1px 0 rgba(181, 155, 136, 0.3); }
        .btn-outline { 
            background: var(--card-bg); 
            background-image: linear-gradient(180deg, #FFFFFF 0%, #FAF7F4 100%);
            color: var(--main-text); border: 2px solid var(--main-border); 
        }
        .btn-outline:active { background-color: var(--price-bg); }
        
        /* ✏️ 小圖示按鈕 */
        .icon-btn {
            background: var(--input-bg); color: var(--main-text); border: 2px solid var(--main-border); 
            border-radius: 10px; width: 40px; height: 40px; padding: 0;
            display: flex; align-items: center; justify-content: center; 
            box-shadow: 1px 2px 0 rgba(181, 155, 136, 0.2); transition: 0.2s; flex-shrink: 0;
        }
        .icon-btn:active { transform: translate(1px,1px); box-shadow: none; }
        .icon-btn.danger { color: var(--color-terracotta); background: #FFF7F5; border-color: rgba(205, 139, 118, 0.5); }

        .map-btn { background-image: linear-gradient(180deg, var(--main-btn) 0%, #95755E 100%); color: white; width: 100%; margin-top: 14px; border-radius: 12px; border:none; padding: 14px; box-shadow: 2px 3px 0 rgba(168, 134, 110, 0.3); }
        .map-route-btn { background-color: var(--color-yellow); background-image: linear-gradient(180deg, var(--color-yellow) 0%, #D4A955 100%); color: var(--main-text); width: 100%; margin-top: 14px; border-radius: 12px; border:none; padding: 14px; box-shadow: 2px 3px 0 rgba(226, 185, 101, 0.3); }
        
        /* 📝 輸入框 */
        input, select, textarea { 
            width: 100%; padding: 14px 16px; margin: 6px 0 16px 0; 
            border: 2px solid var(--main-border); background: var(--card-bg); border-radius: 14px; 
            font-size: 1.05rem; color: var(--main-text); outline: none; font-weight: 700;
            transition: 0.2s;
        }
        input:focus, select:focus, textarea:focus { background: var(--input-bg); border-color: var(--color-yellow); box-shadow: 0 0 0 3px rgba(226, 185, 101, 0.2); }
        input[type="checkbox"] { width: 26px; height: 26px; accent-color: var(--color-matcha); cursor: pointer; margin: 0; border-radius: 8px; border: 2px solid var(--main-border); flex-shrink: 0; }
        
        .strikethrough { opacity: 0.6; filter: grayscale(50%); transition: all 0.3s; }
        .strikethrough span, .strikethrough b, .strikethrough p { text-decoration: line-through; }
        
        /* ⏰ 行程時間軸 */
        .timeline-container { display: flex; margin-bottom: 22px; align-items: stretch; }
        .timeline-left { display: flex; flex-direction: column; align-items: center; margin-right: 16px; width: 50px; }
        .timeline-time { background: var(--card-bg); border: 2px solid var(--main-border); border-radius: 50%; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 0.85rem; color: var(--main-text); z-index: 2; margin-top: 10px; box-shadow: 1px 2px 0 rgba(181, 155, 136, 0.2); }
        .timeline-line { flex: 1; border-left: 3px dashed var(--main-border); margin-top: 5px; margin-bottom: -30px; z-index: 1; }
        .timeline-card { flex: 1; margin-bottom: 0; }
        .timeline-card::before { left: 20px; right: auto; top: -7px; background-color: var(--color-matcha); opacity: 0.4;}

        /* 極簡標籤 */
        .clean-divider { display:flex; align-items:center; margin: 25px 0 18px; }
        .clean-divider::before, .clean-divider::after { content:""; flex:1; height:2px; background:var(--main-border); opacity:0.3; border-radius:2px; }
        .clean-divider span { padding: 4px 16px; font-size: 0.9rem; font-weight: 800; color: var(--main-text); border: 2px solid var(--main-border); border-radius: 20px; background: var(--input-bg); margin: 0 12px; }
        
        .inline-icon { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; vertical-align: text-bottom; }

        /* 圖片處理 */
        .img-thumbnail { width: 90px; height: 90px; object-fit: cover; border-radius: 12px; margin-top: 12px; display: block; cursor: pointer; border: 2px solid var(--main-border); box-shadow: 2px 2px 0 rgba(181, 155, 136, 0.2); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(122, 95, 79, 0.85); z-index: 9999; justify-content: center; align-items: center; }
        .modal img { max-width: 90%; max-height: 85%; border-radius: 20px; border: 4px solid var(--bg-cream); box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

    <header id="header-title">旅行小助手</header>

    <div id="image-modal" class="modal" onclick="this.style.display='none'">
        <img id="modal-img" src="">
    </div>

    <div id="home" class="page active">
        <div class="card">
            <h2 style="margin-bottom: 20px; font-weight: 900; font-size: 1.45rem; display:flex; align-items:center; gap:10px;">
                <svg viewBox="0 0 24 24" style="width:22px;height:22px;stroke:var(--color-yellow);fill:none;stroke-width:3;"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
                今日進度
            </h2>
            
            <div class="stat-wrapper" style="background: rgba(205, 139, 118, 0.1);">
                <span class="stat-label" style="color: var(--color-terracotta);">
                    <svg viewBox="0 0 24 24" class="inline-icon"><rect x="4" y="6" width="16" height="15" rx="2" ry="2"></rect><path d="M8 6V4c0-1.1.9-2 2-2h4c1.1 0 2 .9 2 2v2"></path></svg> 行李準備
                </span>
                <span class="stat-value" style="color: var(--color-terracotta);" id="stat-luggage">0%</span>
            </div>
            <div class="stat-wrapper" style="background: rgba(156, 178, 146, 0.15);">
                <span class="stat-label" style="color: var(--color-matcha);">
                    <svg viewBox="0 0 24 24" class="inline-icon"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg> 行程完成
                </span>
                <span class="stat-value" style="color: var(--color-matcha);" id="stat-iti-percent">0%</span>
            </div>
            <div class="stat-wrapper" style="background: rgba(143, 174, 193, 0.15);">
                <span class="stat-label" style="color: var(--color-babyblue);">
                    <svg viewBox="0 0 24 24" class="inline-icon"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line></svg> 購物清單
                </span>
                <span class="stat-value" style="color: var(--color-babyblue);">已買 <span id="stat-shopping">0</span> / <span id="stat-shopping-total">0</span></span>
            </div>
            
            <div style="margin-top: 24px; padding: 20px; background: var(--input-bg); border-radius: 16px; border: 2px solid var(--main-border); border-left: 6px solid var(--color-yellow);">
                <p style="color: var(--main-text); font-size: 0.95rem; font-weight: 800; margin-bottom: 4px; display:flex; align-items:center; gap:8px;">
                    <svg viewBox="0 0 24 24" class="inline-icon"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg> 匯率參考
                </p>
                <p style="font-size: 1.8rem; font-weight: 900; color: var(--main-text);">1 JPY = <span id="stat-rate">0.21</span> TWD</p>
                <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; font-weight: 700;" id="rate-sync-info">自動同步中...</p>
            </div>
        </div>
        <div style="display: flex; gap: 16px;">
            <button onclick="nav('itinerary')" style="flex: 1; background: var(--color-matcha); border-color: var(--color-matcha); box-shadow: 2px 3px 0 rgba(156,178,146,0.3);">查看行程</button>
            <button onclick="nav('shopping')" class="btn-outline" style="flex: 1;">購物清單</button>
        </div>
    </div>

    <div id="itinerary" class="page">
        <div class="card" style="background: var(--input-bg);">
            <h3 style="margin-bottom: 16px; font-weight: 900;">
                <svg class="inline-icon" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"></path></svg> 加入新行程
            </h3>
            <div style="display: flex; gap: 12px;">
                <select id="new-iti-day" style="flex: 1;">
                    <option value="Day 1">Day 1</option><option value="Day 2">Day 2</option>
                    <option value="Day 3">Day 3</option><option value="Day 4">Day 4</option>
                    <option value="Day 5">Day 5</option><option value="Day 6">Day 6</option>
                    <option value="Day 7">Day 7</option><option value="Day 8">Day 8</option>
                    <option value="Day 9">Day 9</option><option value="Day 10">Day 10</option>
                </select>
                <input type="date" id="new-iti-date" style="flex: 1.5;">
            </div>
            <div style="display: flex; gap: 12px;">
                <input type="time" id="new-iti-time" style="flex: 1;">
                <input type="text" id="new-iti-end" placeholder="目的地" style="flex: 2;">
            </div>
            <input type="text" id="new-iti-note" placeholder="備註 (選填)">
            <button onclick="addItinerary()" style="width: 100%; background: var(--color-matcha); border-color: var(--color-matcha); box-shadow: 2px 3px 0 rgba(156,178,146,0.3);">新增行程</button>
        </div>
        
        <div id="edit-iti-form-container" style="display: none; background: var(--input-bg); padding: 20px; border-radius: 16px; border: 2px solid var(--main-border); margin-bottom: 24px; box-shadow: 2px 3px 0 rgba(181, 155, 136, 0.2);">
            <h3 style="margin-bottom: 16px; font-weight: 900;">編輯行程</h3>
            <input type="hidden" id="edit-iti-id">
            <div style="display: flex; gap: 12px;">
                <select id="edit-iti-day" style="flex: 1;">
                    <option value="Day 1">Day 1</option><option value="Day 2">Day 2</option>
                    <option value="Day 3">Day 3</option><option value="Day 4">Day 4</option>
                    <option value="Day 5">Day 5</option>
                </select>
                <input type="date" id="edit-iti-date" style="flex: 1.5;">
            </div>
            <div style="display: flex; gap: 12px;">
                <input type="time" id="edit-iti-time" style="flex: 1;">
                <input type="text" id="edit-iti-end" placeholder="目的地" style="flex: 2;">
            </div>
            <input type="text" id="edit-iti-note" placeholder="備註 (選填)">
            <div style="display: flex; gap: 12px; margin-top: 12px;">
                <button onclick="document.getElementById('edit-iti-form-container').style.display='none'" class="btn-outline" style="flex: 1;">取消</button>
                <button onclick="saveEditIti()" style="flex: 2; background: var(--color-matcha); border-color: var(--color-matcha); box-shadow: 2px 3px 0 rgba(156,178,146,0.3);">儲存</button>
            </div>
        </div>

        <div id="itinerary-list"></div>
    </div>

    <div id="luggage" class="page">
        <div class="card" style="background: var(--input-bg);">
            <h3 style="margin-bottom: 16px; font-weight: 900;">
                <svg class="inline-icon" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"></path></svg> 新增行李
            </h3>
            <div style="display: flex; gap: 12px; margin-bottom: 12px;">
                <input type="text" id="new-luggage" placeholder="新增項目..." style="margin:0; flex:1.5;">
                <input type="text" id="new-luggage-note" placeholder="備註(選填)" style="margin:0; flex:1;">
            </div>
            <button onclick="addLuggage()" style="width: 100%; background: var(--color-terracotta); border-color: var(--color-terracotta); box-shadow: 2px 3px 0 rgba(205,139,118,0.3);">添加</button>
        </div>

        <div id="edit-lug-form-container" style="display: none; background: var(--input-bg); padding: 20px; border-radius: 16px; border: 2px solid var(--main-border); margin-bottom: 24px; box-shadow: 2px 3px 0 rgba(181, 155, 136, 0.2);">
            <h3 style="margin-bottom: 16px; font-weight: 900;">編輯行李</h3>
            <input type="hidden" id="edit-lug-id">
            <input type="text" id="edit-lug-name" placeholder="行李名稱">
            <input type="text" id="edit-lug-note" placeholder="備註 (選填)">
            <div style="display: flex; gap: 12px; margin-top: 12px;">
                <button onclick="document.getElementById('edit-lug-form-container').style.display='none'" class="btn-outline" style="flex: 1;">取消</button>
                <button onclick="saveEditLug()" style="flex: 2; background: var(--color-terracotta); border-color: var(--color-terracotta); box-shadow: 2px 3px 0 rgba(205,139,118,0.3);">儲存</button>
            </div>
        </div>

        <div id="luggage-list"></div>
    </div>

    <div id="shopping" class="page">
        <button onclick="openAddForm()" style="width: 100%; margin-bottom: 24px; background: var(--color-babyblue); border-color: var(--color-babyblue); box-shadow: 2px 3px 0 rgba(143,174,193,0.3);">
            <svg class="inline-icon" viewBox="0 0 24 24" style="stroke:#FFFFFF;"><path d="M12 5v14M5 12h14"></path></svg> 新增商品
        </button>
        
        <div style="display: flex; gap: 12px; margin-bottom: 24px;">
            <button id="btn-filter-all" onclick="setShopFilter('all')" style="flex: 1;">總清單</button>
            <button id="btn-filter-unpurchased" onclick="setShopFilter('unpurchased')" class="btn-outline" style="flex: 1;">尚未購買</button>
        </div>

        <div id="edit-form-container" style="display: none; background: var(--input-bg); padding: 20px; border-radius: 16px; border: 2px solid var(--main-border); margin-bottom: 24px; box-shadow: 2px 3px 0 rgba(181, 155, 136, 0.2);">
            <h3 id="form-title" style="margin-bottom: 16px; font-weight: 900;">新增商品</h3>
            <input type="hidden" id="edit-id">
            <input type="text" id="edit-name" placeholder="名稱">
            
            <div style="display: flex; gap: 12px;">
                <input type="number" id="edit-qty" placeholder="數量" style="flex:0.8;" min="1" value="1">
                <input type="number" id="edit-price" placeholder="日幣單價" style="flex:1.2;">
            </div>
            
            <input type="text" id="edit-shop" placeholder="購買地點 (選填)">
            <input type="text" id="edit-note" placeholder="備註 (選填)">
            
            <label style="font-size: 0.95rem; color: var(--main-text); font-weight: 800; display: block; margin: 4px 0 8px 4px;">加入圖片 (選填)</label>
            <input type="file" id="edit-image" accept="image/*" style="padding: 12px; background: white; border: 2px dashed var(--main-border);">
            
            <div style="display: flex; gap: 12px; margin-top: 16px;">
                <button onclick="document.getElementById('edit-form-container').style.display='none'" class="btn-outline" style="flex: 1;">取消</button>
                <button onclick="saveShoppingItem()" style="flex: 2; background: var(--color-babyblue); border-color: var(--color-babyblue); box-shadow: 2px 3px 0 rgba(143,174,193,0.3);">儲存</button>
            </div>
        </div>
        
        <div id="shopping-list"></div>
    </div>

    <div id="settings" class="page">
        <div class="card">
            <h3 style="margin-bottom:20px; font-weight: 900;">
                <svg class="inline-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg> 匯率設定
            </h3>
            
            <label style="font-size: 0.95rem; font-weight: 800; display: block; margin: 0 0 8px 4px;">手動設定匯率 (1 JPY = ? TWD)</label>
            <div style="display: flex; gap: 12px; margin-bottom: 16px;">
                <input type="number" step="0.0001" id="manual-rate-input" placeholder="例如: 0.215" style="margin: 0; flex: 2;">
                <button onclick="saveManualRate()" style="flex: 1; background: var(--color-lilac); border-color: var(--color-lilac); box-shadow: 2px 3px 0 rgba(180,155,170,0.3);">儲存</button>
            </div>

            <div style="text-align: center; margin: 16px 0; color: var(--text-muted); font-size: 0.85rem; font-weight: 700;">— 或 —</div>
            
            <button id="update-rate-btn" onclick="fetchLiveRate()" class="btn-outline" style="width: 100%; margin-bottom: 16px; background: var(--card-bg);">
                <svg class="inline-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg> 網路最新匯率
            </button>
            
            <p id="settings-rate-display" style="text-align: center; font-size: 1.05rem; font-weight: 900; margin-bottom: 10px; background: var(--input-bg); padding: 16px; border-radius: 14px; border: 2px solid var(--main-border);"></p>
        </div>

        <div class="card">
            <h3 style="margin-bottom:20px; font-weight: 900; color: var(--color-terracotta);">
                <svg class="inline-icon" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg> 資料備份
            </h3>
            <p style="font-size: 0.95rem; color: var(--text-muted); margin-bottom: 12px; margin-left: 4px; font-weight: 700;">複製下方亂碼，換手機時貼上就能還原所有資料。</p>
            <textarea id="backup-data" placeholder="備份碼顯示於此..." style="height: 80px; font-size: 0.85rem; line-height: 1.5; background: var(--input-bg); border-color: var(--main-border);"></textarea>
            <div style="display: flex; gap: 12px; margin-bottom: 24px;">
                <button onclick="exportData()" style="flex:1;">導出</button>
                <button onclick="importData()" style="flex:1;" class="btn-outline">導入</button>
            </div>
            
            <button onclick="resetData()" style="width: 100%; background: #FFF0F0; color: var(--accent-red); border-color: rgba(217,140,133,0.5);" class="btn-outline">⚠️ 清空所有資料</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <div id="nav-home" class="nav-item active" onclick="nav('home')">
            <div class="nav-icon-bg" style="--bg-color: var(--color-yellow);"><svg class="nav-svg" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg></div>
            <span>首頁</span>
        </div>
        <div id="nav-luggage" class="nav-item" onclick="nav('luggage')">
            <div class="nav-icon-bg" style="--bg-color: var(--color-terracotta);"><svg class="nav-svg" viewBox="0 0 24 24"><rect x="4" y="6" width="16" height="15" rx="2" ry="2"></rect><path d="M8 6V4c0-1.1.9-2 2-2h4c1.1 0 2 .9 2 2v2"></path><line x1="8" y1="11" x2="16" y2="11"></line><line x1="8" y1="16" x2="16" y2="16"></line></svg></div>
            <span>行李</span>
        </div>
        <div id="nav-itinerary" class="nav-item" onclick="nav('itinerary')">
            <div class="nav-icon-bg" style="--bg-color: var(--color-matcha);"><svg class="nav-svg" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line><path d="M9 16h6"></path><path d="M12 13v6"></path></svg></div>
            <span>行程</span>
        </div>
        <div id="nav-shopping" class="nav-item" onclick="nav('shopping')">
            <div class="nav-icon-bg" style="--bg-color: var(--color-babyblue);"><svg class="nav-svg" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg></div>
            <span>購物</span>
        </div>
        <div id="nav-settings" class="nav-item" onclick="nav('settings')">
            <div class="nav-icon-bg" style="--bg-color: var(--color-lilac);"><svg class="nav-svg" viewBox="0 0 24 24"><line x1="4" y1="21" x2="4" y2="14"></line><line x1="4" y1="10" x2="4" y2="3"></line><line x1="12" y1="21" x2="12" y2="12"></line><line x1="12" y1="8" x2="12" y2="3"></line><line x1="20" y1="21" x2="20" y2="16"></line><line x1="20" y1="12" x2="20" y2="3"></line><line x1="1" y1="14" x2="7" y2="14"></line><line x1="9" y1="8" x2="15" y2="8"></line><line x1="17" y1="16" x2="23" y2="16"></line></svg></div>
            <span>設定</span>
        </div>
    </nav>

    <script>
        const svgEdit = `<svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>`;
        const svgTrash = `<svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>`;
        const svgMap = `<svg class="inline-icon" viewBox="0 0 24 24" style="margin-right:6px;"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>`;
        const svgCar = `<svg class="inline-icon" viewBox="0 0 24 24" style="margin-right:6px;"><rect x="3" y="11" width="18" height="8" rx="2"></rect><path d="M4 11V7a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v4"></path><circle cx="7" cy="19" r="2"></circle><circle cx="17" cy="19" r="2"></circle></svg>`;
    </script>

<script>
    const defaultData = { rate: 0.21, luggage: [], itinerary: [], shopping: [] };
    let appData = JSON.parse(localStorage.getItem('jpTravelApp')) || defaultData;
    let currentShopFilter = 'all';

    function saveData() { localStorage.setItem('jpTravelApp', JSON.stringify(appData)); updateStats(); }

    function nav(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => {
            n.classList.remove('active');
            n.querySelector('.nav-icon-bg').style.backgroundColor = 'transparent';
        });
        
        document.getElementById(pageId).classList.add('active');
        const activeNav = document.getElementById('nav-' + pageId);
        activeNav.classList.add('active');
        // 套用專屬色彩圓底
        const activeBg = activeNav.querySelector('.nav-icon-bg');
        activeBg.style.backgroundColor = getComputedStyle(activeBg).getPropertyValue('--bg-color');
        
        if(pageId === 'itinerary') renderItinerary();
        if(pageId === 'luggage') renderLuggage();
        if(pageId === 'shopping') renderShopping();
        window.scrollTo(0, 0);
    }

    function formatShortDate(dateStr) {
        if(!dateStr) return '';
        const d = new Date(dateStr);
        if(isNaN(d.getTime())) return dateStr;
        return `${d.getMonth()+1}/${d.getDate()}`;
    }

    // --- 行程功能 ---
    function renderItinerary() {
        const container = document.getElementById('itinerary-list'); container.innerHTML = '';
        
        const sortedIti = [...appData.itinerary].sort((a, b) => {
            if (a.checked !== b.checked) return a.checked ? 1 : -1;
            if (a.date !== b.date) return a.date.localeCompare(b.date);
            return a.time.localeCompare(b.time);
        });

        let prevLocationByDay = {};
        let currentDayLabel = "";

        sortedIti.forEach((item) => {
            let url = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.end)}`;
            let btnHtml = `<button class="map-btn" onclick="window.open('${url}')">${svgMap} 導航前往</button>`;
            
            if (prevLocationByDay[item.date] && !item.checked) {
                const origin = prevLocationByDay[item.date];
                url = `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(origin)}&destination=${encodeURIComponent(item.end)}`;
                btnHtml = `<button class="map-route-btn" onclick="window.open('${url}')">${svgCar} 路線與時間</button>`;
            }
            prevLocationByDay[item.date] = item.end;

            // 乾淨的膠囊標題
            if(item.date !== currentDayLabel) {
                currentDayLabel = item.date;
                const shortDate = formatShortDate(item.realDate);
                const displayTitle = shortDate ? `${item.date} (${shortDate})` : item.date;
                
                container.innerHTML += `
                <div style="background: var(--card-bg); border: 2px solid var(--main-border); border-radius: 20px; display: flex; justify-content: space-between; align-items: center; padding: 12px 24px; margin: 24px 0 20px; box-shadow: 2px 3px 0 rgba(181, 155, 136, 0.2);">
                    <span style="color: var(--main-border); font-weight: 900; font-size:1.1rem;"><</span>
                    <span style="color: var(--color-matcha); font-size: 1.2rem; font-weight: 900;">${displayTitle}</span>
                    <span style="color: var(--main-border); font-weight: 900; font-size:1.1rem;">></span>
                </div>`;
            }

            const noteStr = item.note ? `
                <div style="background:var(--bg-cream); padding:12px 14px; border-radius:12px; margin:16px 0 0 0; font-weight:700; font-size:0.95rem; color:var(--main-text); border: 1px dashed var(--main-border); display:flex; align-items:flex-start; gap:8px;">
                    <svg class="inline-icon" viewBox="0 0 24 24" style="color:var(--color-matcha); flex-shrink:0; margin-top:2px;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    <span>${item.note}</span>
                </div>` : '';
            
            container.innerHTML += `
            <div class="timeline-container ${item.checked?'strikethrough':''}">
                <div class="timeline-left">
                    <div class="timeline-time">${item.time || '—'}</div>
                    <div class="timeline-line"></div>
                </div>
                <div class="card timeline-card">
                    <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                        <div style="flex:1;">
                            <p style="font-weight:900; font-size:1.25rem; margin-bottom:8px;">${item.end}</p>
                            <div style="display:flex; align-items:center; gap:10px;">
                                <input type="checkbox" ${item.checked?'checked':''} onchange="toggleIti(${item.id})">
                                <span style="font-size:0.9rem; color:var(--text-muted); font-weight:700;">打卡確認</span>
                            </div>
                        </div>
                        <div style="display:flex; gap:8px; margin-left:12px;">
                            <button class="icon-btn" onclick="editIti(${item.id})">${svgEdit}</button>
                            <button class="icon-btn danger" onclick="deleteIti(${item.id})">${svgTrash}</button>
                        </div>
                    </div>
                    ${noteStr}
                    ${!item.checked ? btnHtml : ''}
                </div>
            </div>`;
        });
    }
    
    function toggleIti(id) { const i = appData.itinerary.find(x=>x.id==id); i.checked = !i.checked; saveData(); renderItinerary(); }
    
    function addItinerary() { 
        const d = document.getElementById('new-iti-day').value;
        const rd = document.getElementById('new-iti-date').value;
        const t = document.getElementById('new-iti-time').value;
        const e = document.getElementById('new-iti-end').value;
        const n = document.getElementById('new-iti-note').value;
        if(e){ 
            appData.itinerary.push({id:Date.now(), date:d, realDate:rd, time:t, end:e, note:n, checked:false}); 
            saveData(); renderItinerary();
            document.getElementById('new-iti-end').value = '';
            document.getElementById('new-iti-note').value = '';
        }
    }

    function editIti(id) {
        const item = appData.itinerary.find(i => i.id == id);
        if(!item) return;
        document.getElementById('edit-iti-id').value = item.id;
        document.getElementById('edit-iti-day').value = item.date || 'Day 1';
        document.getElementById('edit-iti-date').value = item.realDate || '';
        document.getElementById('edit-iti-time').value = item.time || '';
        document.getElementById('edit-iti-end').value = item.end || '';
        document.getElementById('edit-iti-note').value = item.note || '';
        document.getElementById('edit-iti-form-container').style.display = 'block';
        window.scrollTo({ top: document.getElementById('edit-iti-form-container').offsetTop - 20, behavior: 'smooth' });
    }

    function saveEditIti() {
        const id = document.getElementById('edit-iti-id').value;
        const d = document.getElementById('edit-iti-day').value;
        const rd = document.getElementById('edit-iti-date').value;
        const t = document.getElementById('edit-iti-time').value;
        const e = document.getElementById('edit-iti-end').value;
        const n = document.getElementById('edit-iti-note').value;
        if(!e) return;

        const index = appData.itinerary.findIndex(x => x.id == id);
        if(index > -1) {
            appData.itinerary[index].date = d;
            appData.itinerary[index].realDate = rd;
            appData.itinerary[index].time = t;
            appData.itinerary[index].end = e;
            appData.itinerary[index].note = n;
            document.getElementById('edit-iti-form-container').style.display = 'none';
            saveData(); renderItinerary();
        }
    }

    function deleteIti(id) { 
        if(confirm("確定要刪除這個行程嗎？")) { appData.itinerary = appData.itinerary.filter(i=>i.id!=id); saveData(); renderItinerary(); }
    }

    // --- 行李功能 ---
    function renderLuggage() {
        const container = document.getElementById('luggage-list'); container.innerHTML = '';
        appData.luggage.forEach((item) => {
            const noteStr = item.note ? `
                <div style="display:flex; align-items:center; gap:6px; margin-top:6px;">
                    <svg class="inline-icon" style="color:var(--color-terracotta); width:15px; height:15px;" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    <span style="font-size:0.95rem; color:var(--text-muted); font-weight:700;">${item.note}</span>
                </div>` : '';
            
            // 💯 確保按鈕強制在右邊 (寬度100%撐開)
            container.innerHTML += `
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; width:100%;">
                    <div style="display:flex; gap:16px; flex:1; align-items: center; min-width:0;">
                        <input type="checkbox" ${item.checked?'checked':''} onchange="toggleLug(${item.id})" class="${item.checked?'strikethrough':''}">
                        <div style="flex:1; overflow:hidden;" class="${item.checked?'strikethrough':''}">
                            <span style="font-weight:900; font-size:1.15rem; color:var(--main-text);">${item.name}</span>
                            ${noteStr}
                        </div>
                    </div>
                    <div style="display:flex; gap:8px; margin-left:12px; flex-shrink:0;">
                        <button class="icon-btn" onclick="editLug(${item.id})">${svgEdit}</button>
                        <button class="icon-btn danger" onclick="deleteLug(${item.id})">${svgTrash}</button>
                    </div>
                </div>
            </div>`;
        });
    }

    function toggleLug(id) { const i = appData.luggage.find(x=>x.id==id); i.checked = !i.checked; saveData(); renderLuggage(); }
    
    function addLuggage() { 
        const v = document.getElementById('new-luggage').value; 
        const n = document.getElementById('new-luggage-note').value;
        if(v){ 
            appData.luggage.push({id:Date.now(), name:v, note:n, checked:false}); 
            document.getElementById('new-luggage').value=''; 
            document.getElementById('new-luggage-note').value='';
            saveData(); renderLuggage(); 
        }
    }

    function editLug(id) {
        const item = appData.luggage.find(l => l.id == id);
        if(!item) return;
        document.getElementById('edit-lug-id').value = item.id;
        document.getElementById('edit-lug-name').value = item.name || '';
        document.getElementById('edit-lug-note').value = item.note || '';
        document.getElementById('edit-lug-form-container').style.display = 'block';
        window.scrollTo({ top: document.getElementById('edit-lug-form-container').offsetTop - 100, behavior: 'smooth' });
    }

    function saveEditLug() {
        const id = document.getElementById('edit-lug-id').value;
        const name = document.getElementById('edit-lug-name').value;
        const note = document.getElementById('edit-lug-note').value;
        if(!name) return;

        const index = appData.luggage.findIndex(x => x.id == id);
        if(index > -1) {
            appData.luggage[index].name = name;
            appData.luggage[index].note = note;
            document.getElementById('edit-lug-form-container').style.display = 'none';
            saveData(); renderLuggage();
        }
    }

    function deleteLug(id) { 
        if(confirm("確定要刪除這個項目嗎？")) { appData.luggage = appData.luggage.filter(l=>l.id!=id); saveData(); renderLuggage(); }
    }

    // --- 購物清單功能 ---
    function setShopFilter(mode) {
        currentShopFilter = mode;
        const btnAll = document.getElementById('btn-filter-all');
        const btnUnpurchased = document.getElementById('btn-filter-unpurchased');
        
        if (mode === 'all') {
            btnAll.className = '';
            btnAll.style.background = 'var(--main-btn)';
            btnAll.style.color = 'white';
            
            btnUnpurchased.className = 'btn-outline';
            btnUnpurchased.style.background = 'var(--card-bg)';
            btnUnpurchased.style.color = 'var(--main-text)';
        } else {
            btnUnpurchased.className = '';
            btnUnpurchased.style.background = 'var(--main-btn)';
            btnUnpurchased.style.color = 'white';
            
            btnAll.className = 'btn-outline';
            btnAll.style.background = 'var(--card-bg)';
            btnAll.style.color = 'var(--main-text)';
        }
        renderShopping();
    }

    function renderShopping() {
        const container = document.getElementById('shopping-list'); 
        container.innerHTML = '';
        
        const unpurchased = appData.shopping.filter(s => !s.checked);
        const purchased = appData.shopping.filter(s => s.checked);

        const renderItem = (item) => {
            const itemQty = parseInt(item.qty) || 1;
            const totalJpy = Number(item.price_jpy || 0) * itemQty;
            const twd = Math.round(totalJpy * appData.rate);
            
            const shopStr = item.shop ? `
                <div style="display:flex; align-items:center; gap:8px; margin-bottom:6px;">
                    <svg class="inline-icon" style="color:var(--color-babyblue);" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                    <span style="font-size:0.95rem; color:var(--main-text); font-weight:800;">${item.shop}</span>
                </div>` : '';
                
            const noteStr = item.note ? `
                <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px;">
                    <svg class="inline-icon" style="color:var(--text-muted);" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    <span style="font-size:0.95rem; color:var(--text-muted); font-weight:700;">${item.note}</span>
                </div>` : '';
                
            const imgStr = item.image ? `<img src="${item.image}" class="img-thumbnail" onclick="showImage('${item.image}')">` : '';
            
            return `
            <div class="card ${item.checked?'strikethrough':''}">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div style="display:flex; gap:16px; flex:1;">
                        <input type="checkbox" ${item.checked?'checked':''} onchange="toggleShop(${item.id})" style="margin-top:4px;">
                        <div style="flex:1;">
                            <b style="font-size:1.25rem; font-weight:900; color:var(--main-text); display:block; margin-bottom:10px;">
                                ${item.name} 
                                <span style="color:var(--color-babyblue); font-size:1.05rem; margin-left:6px; font-weight:800;">x ${itemQty}</span>
                            </b>
                            
                            <div style="display:flex; align-items:baseline; gap:12px; margin-bottom:14px; flex-wrap:wrap;">
                                <span style="background:var(--color-babyblue); color:white; padding:4px 12px; border-radius:8px; font-size:1.15rem; font-weight:900; box-shadow: 2px 2px 0 rgba(143, 174, 193, 0.4);">¥ ${totalJpy.toLocaleString()}</span>
                                <span style="color:var(--text-muted); font-size:0.95rem; font-weight:800;">約 NT$ ${twd.toLocaleString()}</span>
                            </div>

                            ${shopStr}
                            ${noteStr}
                            ${imgStr}
                        </div>
                    </div>
                    <div style="display:flex; flex-direction:column; gap:10px; margin-left:12px;">
                        <button class="icon-btn" onclick="editShop(${item.id})">${svgEdit}</button>
                        <button class="icon-btn danger" onclick="deleteShop(${item.id})">${svgTrash}</button>
                    </div>
                </div>
            </div>`;
        };

        if (unpurchased.length > 0) {
            if (currentShopFilter === 'all') {
                container.innerHTML += `<div class="clean-divider"><span>尚未購買</span></div>`;
            }
            unpurchased.forEach(item => { container.innerHTML += renderItem(item); });
        } else if (appData.shopping.length > 0) {
            container.innerHTML += `<div style="text-align:center; padding: 40px 0;"><svg viewBox="0 0 24 24" style="width:50px;height:50px;stroke:var(--color-babyblue);fill:none;stroke-width:2;margin-bottom:10px;"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg><p style="color:var(--main-text); font-weight:900; font-size:1.2rem;">所有商品都買齊囉！</p></div>`;
        }

        if (currentShopFilter === 'all' && purchased.length > 0) {
            container.innerHTML += `<div class="clean-divider"><span>已完成清單</span></div>`;
            purchased.forEach(item => { container.innerHTML += renderItem(item); });
        }
    }

    function toggleShop(id) { const i = appData.shopping.find(s=>s.id==id); i.checked = !i.checked; saveData(); renderShopping(); }
    
    function openAddForm() { 
        document.getElementById('form-title').innerText = '新增商品';
        document.getElementById('edit-id').value = '';
        document.getElementById('edit-name').value = '';
        document.getElementById('edit-qty').value = '1'; 
        document.getElementById('edit-price').value = '';
        document.getElementById('edit-shop').value = '';
        document.getElementById('edit-note').value = '';
        document.getElementById('edit-image').value = '';
        document.getElementById('edit-form-container').style.display='block'; 
        window.scrollTo({ top: document.getElementById('edit-form-container').offsetTop - 20, behavior: 'smooth' });
    }

    function editShop(id) {
        const item = appData.shopping.find(s => s.id == id);
        if(!item) return;
        
        document.getElementById('form-title').innerText = '編輯商品';
        document.getElementById('edit-id').value = item.id;
        document.getElementById('edit-name').value = item.name || '';
        document.getElementById('edit-qty').value = item.qty || '1'; 
        document.getElementById('edit-price').value = item.price_jpy || '';
        document.getElementById('edit-shop').value = item.shop || '';
        document.getElementById('edit-note').value = item.note || '';
        document.getElementById('edit-image').value = ''; 
        
        document.getElementById('edit-form-container').style.display = 'block';
        window.scrollTo({ top: document.getElementById('edit-form-container').offsetTop - 20, behavior: 'smooth' });
    }
    
    // 💯 高畫質圖片壓縮處理 (解析度提升至 1200px，畫質提升至 0.9)
    function compressImage(file, callback) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 1200; const MAX_HEIGHT = 1200;
                let width = img.width; let height = img.height;
                if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } } 
                else { if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } }
                canvas.width = width; canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                callback(canvas.toDataURL('image/jpeg', 0.9)); 
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function saveShoppingItem() {
        const id = document.getElementById('edit-id').value;
        const n = document.getElementById('edit-name').value;
        const q = document.getElementById('edit-qty').value || 1; 
        const p = document.getElementById('edit-price').value;
        const s = document.getElementById('edit-shop').value;
        const note = document.getElementById('edit-note').value;
        const fileInput = document.getElementById('edit-image');
        
        if(!n) { alert("請至少輸入商品名稱！"); return; }

        const saveToData = (imgData) => {
            if(id) {
                const index = appData.shopping.findIndex(x => x.id == id);
                if(index > -1) {
                    appData.shopping[index].name = n;
                    appData.shopping[index].qty = q;
                    appData.shopping[index].price_jpy = p;
                    appData.shopping[index].shop = s;
                    appData.shopping[index].note = note;
                    if(imgData) appData.shopping[index].image = imgData; 
                }
            } else {
                appData.shopping.unshift({id:Date.now(), name:n, qty:q, price_jpy:p, shop:s, note:note, image:imgData, checked:false}); 
            }
            document.getElementById('edit-form-container').style.display='none'; 
            saveData(); renderShopping();
        };

        if(fileInput.files && fileInput.files[0]) {
            compressImage(fileInput.files[0], saveToData);
        } else {
            saveToData(''); 
        }
    }
    
    function deleteShop(id) { 
        if(confirm("確定要刪除這個商品嗎？")) { appData.shopping = appData.shopping.filter(s=>s.id!=id); saveData(); renderShopping(); }
    }
    
    function showImage(src) {
        document.getElementById('modal-img').src = src;
        document.getElementById('image-modal').style.display = 'flex';
    }

    // --- 設定與匯率 ---
    function updateStats() {
        const dL = appData.luggage.filter(l => l.checked).length;
        document.getElementById('stat-luggage').innerText = appData.luggage.length ? Math.round(dL/appData.luggage.length*100)+'%' : '0%';
        const dI = appData.itinerary.filter(i => i.checked).length;
        document.getElementById('stat-iti-percent').innerText = appData.itinerary.length ? Math.round(dI/appData.itinerary.length*100)+'%' : '0%';
        document.getElementById('stat-shopping').innerText = appData.shopping.filter(s => s.checked).length;
        document.getElementById('stat-shopping-total').innerText = appData.shopping.length;
        document.getElementById('stat-rate').innerText = appData.rate;
        
        const settingsRateDisplay = document.getElementById('settings-rate-display');
        if(settingsRateDisplay) { settingsRateDisplay.innerText = "當前系統設定匯率：1 JPY = " + appData.rate + " TWD"; }
        
        const manualInput = document.getElementById('manual-rate-input');
        if(manualInput) { manualInput.value = appData.rate; }
    }

    function saveManualRate() {
        const val = parseFloat(document.getElementById('manual-rate-input').value);
        if(val && val > 0) {
            appData.rate = val;
            saveData();
            document.getElementById('rate-sync-info').innerText = "已套用手動設定匯率";
            alert("匯率已成功手動更新為: " + val);
        } else {
            alert("請輸入有效的匯率數字喔！");
        }
    }

    async function fetchLiveRate() { 
        const btn = document.getElementById('update-rate-btn');
        document.getElementById('rate-sync-info').innerText = "網路更新中...";
        if(btn) btn.innerHTML = `<svg viewBox="0 0 24 24" style="width:17px;height:17px;stroke:var(--dark-cocoa);fill:none;stroke-width:3;margin-right:6px;"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg> 更新中...`;
        
        try { 
            const r = await fetch('https://api.exchangerate-api.com/v4/latest/JPY'); 
            const d = await r.json(); 
            appData.rate = Math.round(d.rates.TWD * 10000)/10000; 
            saveData(); 
            document.getElementById('rate-sync-info').innerText = "最後自動更新: " + new Date().toLocaleTimeString();
            
            if(btn) { btn.innerHTML = "✓ 網路抓取成功"; setTimeout(() => { btn.innerHTML = `<svg viewBox="0 0 24 24" style="width:17px;height:17px;stroke:var(--dark-cocoa);fill:none;stroke-width:3;margin-right:6px;"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg> 網路最新匯率`; }, 3000); }
        } catch(e){ 
            document.getElementById('rate-sync-info').innerText = "連網失敗，請使用手動輸入"; 
            if(btn) { btn.innerHTML = "連線失敗"; setTimeout(() => { btn.innerHTML = `<svg viewBox="0 0 24 24" style="width:17px;height:17px;stroke:var(--dark-cocoa);fill:none;stroke-width:3;margin-right:6px;"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg> 網路最新匯率`; }, 3000); }
        } 
    }

    function exportData() { document.getElementById('backup-data').value = btoa(unescape(encodeURIComponent(JSON.stringify(appData)))); alert("備份碼已生成！\n請複製並傳送到手機，或自己保存。"); }
    function importData() { try { const code = document.getElementById('backup-data').value; if(code) { appData = JSON.parse(decodeURIComponent(escape(atob(code)))); saveData(); alert("資料導入成功！"); location.reload(); } } catch(e) { alert("代碼錯誤，請確認備份碼是否完整！"); } }
    function resetData() { if(confirm("⚠️ 警告：確定要清空所有資料嗎？此動作無法復原！")) { localStorage.clear(); location.reload(); } }

    // 初始化啟動首頁的顏色
    document.addEventListener("DOMContentLoaded", () => {
        const homeNav = document.getElementById('nav-home');
        const activeBg = homeNav.querySelector('.nav-icon-bg');
        activeBg.style.backgroundColor = getComputedStyle(activeBg).getPropertyValue('--bg-color');
    });

    updateStats(); fetchLiveRate();
</script>
